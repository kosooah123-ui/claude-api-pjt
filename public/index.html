<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>냉장고 레시피 추천 - 1단계 (식재료 인식)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section id="authSection">
      <div id="loggedOutView">
        <h2>로그인 / 회원가입</h2>
        <input type="email" id="authEmail" placeholder="이메일" />
        <input type="password" id="authPassword" placeholder="비밀번호" />
        <button id="signupBtn" type="button">회원가입</button>
        <button id="loginBtn" type="button">로그인</button>
        <p id="authStatus" class="status"></p>
      </div>
      <div id="loggedInView" hidden>
        <span id="loggedInEmail"></span>
        <button id="logoutBtn" type="button">로그아웃</button>
      </div>
    </section>

    <h1>냉장고 사진으로 식재료 인식하기</h1>
    <p class="subtitle">냉장고 내부 사진을 업로드하면 AI가 식재료 목록을 인식합니다.</p>

    <div class="upload-box">
      <input type="file" id="fileInput" accept="image/*" />
      <img id="preview" alt="업로드된 이미지 미리보기" hidden />
    </div>

    <button id="recognizeBtn" disabled>식재료 인식하기</button>
    <p id="status" class="status"></p>

    <section id="resultSection" hidden>
      <h2>인식된 식재료</h2>
      <ul id="ingredientList"></ul>
      <button id="addIngredientBtn" type="button">+ 재료 직접 추가</button>

      <div class="preferences">
        <label>알레르기(쉼표로 구분): <input type="text" id="allergiesInput" placeholder="예: 땅콩, 새우" /></label>
        <label>난이도:
          <select id="difficultyInput">
            <option value="">무관</option>
            <option value="easy">쉬움</option>
            <option value="medium">보통</option>
            <option value="hard">어려움</option>
          </select>
        </label>
      </div>

      <button id="generateRecipeBtn" type="button">레시피 추천받기</button>
    </section>

    <p id="recipeStatus" class="status"></p>

    <section id="recipeSection" hidden>
      <h2>추천 레시피</h2>
      <div id="recipeList"></div>
      <button id="regenerateBtn" type="button" hidden>다른 레시피 보기</button>
    </section>

    <section id="savedRecipesSection">
      <h2>내 저장된 레시피</h2>
      <p id="savedRecipesStatus" class="status"></p>
      <div id="savedRecipeList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
